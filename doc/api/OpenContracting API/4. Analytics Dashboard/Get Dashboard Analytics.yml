info:
  name: Get Dashboard Analytics
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/analytics?userId="
  auth:
    type: bearer
    token: "{{token}}"
  query:
    - name: userId
      value: ""
      description: Optional. Admins can provide a user ID to scope KYC analytics to that user. Regular users always get their own analytics.

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

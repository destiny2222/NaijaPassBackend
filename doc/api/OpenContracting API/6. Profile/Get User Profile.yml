info:
  name: Get User Profile
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/profile/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Returns the authenticated user profile plus KYC flags. Use user.kyc.hasCompletedKyc to check if KYC is approved.
